name: 'Plan & Apply Terraform'

permissions:
  actions: read
  checks: read
  contents: read
  deployments: none
  id-token: write
  issues: none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: write
  statuses: none

on:
  workflow_call:
    inputs:
      apply:
        description: 'Whether to apply the terraform or just plan'
        default: false
        required: true
        type: boolean
      terraform_path:
        description: 'The name of the terraform paths'
        required: true
        type: string
      oidc_role:
        description: 'The OIDC role to assume for AWS access'
        required: true
        type: string
      default_role:
        description: 'The default CI role to assume'
        required: true
        type: string
      management_role:
        description: 'The management CI role to assume'
        required: true
        type: string
      workspace:
        description: 'Terraform workspace'
        required: true
        type: string
      image_tag:
        description: 'Image tag to use'
        required: false
        type: string
    secrets:
      ssh_private_key_allow_list_repository:
        required: true


jobs:
  terraform_workflow:
    runs-on: ubuntu-latest
    env:
      TF_WORKSPACE: ${{ inputs.workspace }}
      TF_VAR_image_tag: ${{ inputs.image_tag }}
      TF_VAR_default_role: ${{ inputs.default_role }}
      TF_VAR_management_role: ${{ inputs.management_role }}
      TF_VAR_shared_role: ${{ inputs.shared_role }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'

      - name: 'Set terraform version'
        id: set-terraform-version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@b8868247a908f74fafe1905701391580575a6d35 # v4.3.10
        with:
          terraform_directory: ./${{ inputs.terraform_path }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.set-terraform-version.outputs.version }}

      - name: Configure AWS Credentials For Terraform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ inputs.oidc_role }}
          role-duration-seconds: 3600
          role-session-name: OPGLPACodesGithubAction

      - name: Compile OpenAPI file
        run: make build-apigw-openapi-spec

      - id: deploy-key
        uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@a2907c7c7be94301c965ace76a2cfa407ad6fc88 # v4.6.0
        with:
          deploy_key: ${{ secrets.ssh_private_key_allow_list_repository }}

      - name: Terraform Init
        working-directory: ./${{ inputs.terraform_path }}
        env:
          TF_WORKSPACE: default
        run: terraform init -input=false -upgrade

      - name: Terraform Plan
        working-directory: ./${{ inputs.terraform_path }}
        run: |
          terraform workspace show
          terraform plan -input=false -parallelism=30 -out=${{ env.TF_WORKSPACE }}.plan

      - name: Terraform Apply
        working-directory: ./${{ inputs.terraform_path }}
        if: inputs.apply == true
        run: terraform apply -lock-timeout=300s -input=false -auto-approve -parallelism=30 ${{ env.TF_WORKSPACE }}.plan
